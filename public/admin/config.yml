# AmesOmes content studio (Sveltia CMS)
# Docs: https://github.com/sveltia/sveltia-cms

backend:
  name: github
  repo: omarwsadek/amesomes
  branch: main

# Lets you edit locally with NO login while `npm run dev` is running.
# Start the tiny proxy in a second terminal:  npx @sveltia/cms-proxy-server
# then open http://localhost:4321/admin
local_backend: true

# Uploaded images are written next to posts as ../../assets/blog/<file>,
# which matches Astro's image() pipeline (they get optimized at build).
media_folder: "src/assets/blog"
public_folder: "../../assets/blog"

collections:
  - name: journal
    label: "Journal"
    label_singular: "Journal entry"
    description: "Blog posts. New entries publish automatically on save + deploy."
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { name: title, label: "Title", widget: string }
      - { name: description, label: "Short description", widget: text }
      - {
          name: pubDate,
          label: "Publish date",
          widget: datetime,
          date_format: "yyyy-MM-dd",
          time_format: false,
          format: "yyyy-MM-dd",
        }
      - {
          name: updatedDate,
          label: "Updated date",
          widget: datetime,
          required: false,
          date_format: "yyyy-MM-dd",
          time_format: false,
          format: "yyyy-MM-dd",
        }
      - {
          name: category,
          label: "Category",
          widget: select,
          required: false,
          options: ["Journal", "Essay", "Note", "Experiment", "Conversation"],
        }
      - {
          name: heroImage,
          label: "Cover image",
          widget: image,
          required: false,
        }
      - { name: body, label: "Body", widget: markdown }
