# AmesOmes content studio (Sveltia CMS)
# Docs: https://github.com/sveltia/sveltia-cms

backend:
  name: github
  repo: omarwsadek/amesomes
  branch: main
  # OAuth login lives on the site itself (Vercel serverless function).
  base_url: https://amesomes.com
  auth_endpoint: /api/auth

# Lets you edit locally with NO login while `npm run dev` is running.
# Start the tiny proxy in a second terminal:  npx @sveltia/cms-proxy-server
# then open http://localhost:4321/admin
local_backend: true

# Uploaded images/video are stored in /public/uploads and referenced with an
# absolute URL (/uploads/<file>). Sveltia requires public_folder to start "/".
media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  # ---------------------------------------------------------------- Journal
  - name: journal
    label: "Journal"
    label_singular: "Journal entry"
    description: "Blog posts. New entries publish automatically on save + deploy."
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { name: title, label: "Title", widget: string }
      - { name: description, label: "Short description", widget: text }
      - {
          name: pubDate,
          label: "Publish date",
          widget: datetime,
          date_format: "YYYY-MM-DD",
          time_format: false,
          format: "YYYY-MM-DD",
        }
      - {
          name: updatedDate,
          label: "Updated date",
          widget: datetime,
          required: false,
          date_format: "YYYY-MM-DD",
          time_format: false,
          format: "YYYY-MM-DD",
        }
      - {
          name: category,
          label: "Category",
          widget: select,
          required: false,
          options: ["Journal", "Essay", "Note", "Experiment", "Conversation"],
        }
      - { name: heroImage, label: "Cover image", widget: image, required: false }
      - { name: body, label: "Body", widget: markdown }

  # --------------------------------------------------------------- Projects
  - name: projects
    label: "Projects"
    label_singular: "Project"
    description: "Creative work. Text + inline images in the body, plus an optional video."
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { name: title, label: "Title", widget: string }
      - { name: description, label: "Short description", widget: text }
      - {
          name: pubDate,
          label: "Date",
          widget: datetime,
          date_format: "YYYY-MM-DD",
          time_format: false,
          format: "YYYY-MM-DD",
        }
      - {
          name: tags,
          label: "Tags",
          widget: list,
          required: false,
          hint: "Add a few keywords, e.g. web, design, experiment.",
        }
      - {
          name: url,
          label: "External link",
          widget: string,
          required: false,
          hint: "Optional: live site or repo URL.",
        }
      - {
          name: video,
          label: "Video link",
          widget: string,
          required: false,
          hint: "Optional: paste a YouTube, Vimeo, or .mp4 link to embed a video.",
        }
      - { name: heroImage, label: "Cover image", widget: image, required: false }
      - {
          name: body,
          label: "Write-up",
          widget: markdown,
          hint: "Type your text here. Use the image button in the toolbar to drop pictures inline.",
        }

  # ---------------------------------------------------------------- Podcast
  - name: podcast
    label: "Podcast"
    label_singular: "Episode"
    description: "Episodes. Paste a Spotify link and it embeds automatically."
    folder: "src/content/podcast"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { name: title, label: "Episode title", widget: string }
      - { name: description, label: "Short description", widget: text }
      - {
          name: pubDate,
          label: "Publish date",
          widget: datetime,
          date_format: "YYYY-MM-DD",
          time_format: false,
          format: "YYYY-MM-DD",
        }
      - {
          name: spotify,
          label: "Spotify link",
          widget: string,
          required: false,
          hint: "Open the episode in Spotify → Share → Copy link, and paste it here.",
        }
      - { name: heroImage, label: "Cover image", widget: image, required: false }
      - { name: body, label: "Show notes", widget: markdown, required: false }
